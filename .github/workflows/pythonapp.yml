name: Garden Flower CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - master
    tags:
      - "*"

permissions:
  contents: read

jobs:
  event_dedup:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.dedup.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: dedup
        shell: bash
        run: |
          should_run=true

          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == refs/heads/* ]]; then
            git fetch --force --tags

            # If this branch push SHA already has a release tag (v*), skip this run and let the tag run handle CI.
            if git tag --points-at "${GITHUB_SHA}" | grep -Eq '^v[0-9]'; then
              should_run=false
              echo "Skipping duplicate branch run for tagged SHA ${GITHUB_SHA}"
            fi
          fi

          echo "should_run=${should_run}" >> "${GITHUB_OUTPUT}"

  linux_test:
    runs-on: ubuntu-latest
    needs:
      - event_dedup
    if: needs.event_dedup.outputs.should_run == 'true'
    env:
      DISPLAY: :99.0
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt -y install libsdl2-dev libsdl2-ttf-dev libsdl2-image-dev libsdl2-mixer-dev
          sudo apt-get -y install python3-setuptools build-essential libgl1-mesa-dev libgles2-mesa-dev
          /sbin/start-stop-daemon --start --quiet --pidfile /tmp/custom_xvfb_99.pid --make-pidfile --background --exec /usr/bin/Xvfb -- :99 -screen 0 1280x720x24 -ac +extension GLX

          python3 -m pip install --upgrade pip virtualenv wheel setuptools
          python3 -m pip install kivy[base] --pre --extra-index-url https://kivy.org/downloads/simple/
      - name: Install flower
        run: python3 -m pip install -e .[dev,ci] --extra-index-url https://kivy-garden.github.io/simple/
      - name: Make sdist
        run: python3 setup.py sdist --formats=gztar
      - name: Make wheel
        run: python3 setup.py bdist_wheel --universal
      - name: Upload wheels as artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels
          path: dist
      - name: Test with pytest
        run: python3 -m pytest --cov=kivy_garden.markdownlabel --cov-report term --cov-branch

  windows_test:
    runs-on: windows-latest
    needs:
      - event_dedup
    if: needs.event_dedup.outputs.should_run == 'true'
    env:
      KIVY_GL_BACKEND: angle_sdl2
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip virtualenv wheel setuptools
          python -m pip install kivy[base] --pre --extra-index-url https://kivy.org/downloads/simple/
      - name: Install flower
        run: python -m pip install -e .[dev,ci] --extra-index-url https://kivy-garden.github.io/simple/
      - name: Test with pytest
        run: python -m pytest --cov=kivy_garden.markdownlabel --cov-report term --cov-branch

  docs_build:
    runs-on: ubuntu-latest
    needs:
      - event_dedup
    if: needs.event_dedup.outputs.should_run == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install dependencies
        env:
          KIVY_DOC_INCLUDE: 1
          KIVY_DOC: 1
        run: |
          python3 -m pip install --upgrade pip virtualenv wheel setuptools sphinx
          python3 -m pip install kivy[base] --pre --extra-index-url https://kivy.org/downloads/simple/
          python3 -m pip install -e .[dev,ci] --extra-index-url https://kivy-garden.github.io/simple/
      - name: Generate docs
        run: make -C doc html
      - name: Upload docs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: doc/build/html

  release:
    runs-on: ubuntu-latest
    needs:
      - event_dedup
      - linux_test
      - windows_test
    if: needs.event_dedup.outputs.should_run == 'true' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download wheels artifact
        uses: actions/download-artifact@v4
        with:
          name: wheels
          path: dist
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: true

  docs_deploy:
    runs-on: ubuntu-latest
    needs:
      - event_dedup
      - linux_test
      - windows_test
      - docs_build
    if: needs.event_dedup.outputs.should_run == 'true' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: write
    steps:
      - name: Download docs artifact
        uses: actions/download-artifact@v4
        with:
          name: docs
          path: doc/build/html
      - name: Deploy docs to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./doc/build/html
          publish_branch: gh-pages
          force_orphan: true
