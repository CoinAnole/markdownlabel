[tox]
envlist = py38,py39,py310,py311,py312,py313

[testenv]
passenv = DISPLAY,XDG_RUNTIME_DIR,HOME,KIVY_NO_ARGS,KIVY_NO_CONSOLELOG
deps = kivy
extras = dev
commands = pytest kivy_garden/markdownlabel/tests/

# Use explicit basepython paths for uv-managed Python installations
# This ensures virtualenv sets 'home' correctly in pyvenv.cfg
[testenv:py38]
basepython = /home/coinanole/.local/share/uv/python/cpython-3.8.20-linux-x86_64-gnu/bin/python3.8

[testenv:py39]
basepython = /home/coinanole/.local/share/uv/python/cpython-3.9.25-linux-x86_64-gnu/bin/python3.9

[testenv:py310]
basepython = /home/coinanole/.local/share/uv/python/cpython-3.10.19-linux-x86_64-gnu/bin/python3.10

[testenv:py311]
basepython = /home/coinanole/.local/share/uv/python/cpython-3.11.14-linux-x86_64-gnu/bin/python3.11

[testenv:py312]
basepython = /home/coinanole/.local/share/uv/python/cpython-3.12.12-linux-x86_64-gnu/bin/python3.12

[testenv:py313]
basepython = /home/coinanole/.local/share/uv/python/cpython-3.13.10-linux-x86_64-gnu/bin/python3.13
